name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - run: bun install

      - name: Run tests
        run: bun run test
